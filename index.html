<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吳梁聯婚 — Rainkie & Thomas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream:  #fdfaf5;
  --cream2: #f9f2e4;
  --cream3: #f0e0c0;
  --blush:  #e8a5a0;
  --blush2: #d4756e;
  --blush3: #b85a53;
  --sage:   #8aab8a;
  --sage2:  #6b8f6b;
  --sage3:  #4f6b4f;
  --ink:    #4a4a4a;
  --light:  #9a9490;
}

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(253,250,245,0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--cream3);
  display: flex;
  justify-content: center;
}

.nav-btn {
  flex: 1;
  max-width: 140px;
  padding: 14px 8px;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: #9a9490;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  text-align: center;
}

.nav-btn.active {
  color: #b85a53;
  border-bottom-color: #d4756e;
}

.nav-btn-cn {
  display: block;
  font-size: 10px;
  color: #c9c2b8;
  margin-top: 2px;
  text-transform: none;
  letter-spacing: 0;
}

.page {
  display: none;
  min-height: 100vh;
  padding-top: 60px;
}
.page.active { display: block; }

/* ── PAGE 1 DETAILS ── */
.details-hero {
  background: linear-gradient(135deg, rgba(232,165,160,0.18), rgba(138,171,138,0.10));
  padding: 60px 24px 48px;
  text-align: center;
}

.hero-names {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  font-weight: 300;
  color: #b85a53;
  line-height: 1.1;
  letter-spacing: 1px;
}

.hero-names-cn {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  color: #6b8f6b;
  margin-top: 8px;
  letter-spacing: 6px;
}

.hero-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px auto;
  max-width: 200px;
}
.hero-divider span {
  flex: 1;
  height: 1px;
  background: #e8a5a0;
  opacity: 0.5;
}
.hero-divider i {
  color: #e8a5a0;
  font-style: normal;
  font-size: 16px;
}

.hero-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: #d4756e;
  letter-spacing: 3px;
}

.details-grid {
  max-width: 600px;
  margin: 0 auto;
  padding: 40px 24px;
  display: grid;
  gap: 16px;
}

.detail-card {
  background: white;
  border-radius: 20px;
  padding: 28px 24px;
  border: 1px solid #f0e0c0;
  box-shadow: 0 4px 20px rgba(184,90,83,0.06);
  text-align: center;
}

.detail-icon { font-size: 32px; margin-bottom: 12px; }

.detail-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: #b85a53;
  margin-bottom: 4px;
}

.detail-title-cn {
  font-size: 12px;
  color: #4f6b4f;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.detail-content {
  font-size: 15px;
  color: #4a4a4a;
  line-height: 1.8;
}

.detail-content-cn {
  font-size: 13px;
  color: #9a9490;
  line-height: 1.8;
  margin-top: 6px;
}

/* ── PAGE 2 SEATING ── */
.page-header {
  background: linear-gradient(135deg, rgba(232,165,160,0.18), rgba(138,171,138,0.10));
  padding: 48px 24px 36px;
  text-align: center;
}
